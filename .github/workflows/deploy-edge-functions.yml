name: Deploy Edge Functions (scrape-news + retranslate-articles)

on:
  push:
    branches: [ main, feat/archaeology-focus ]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Login to Supabase
        run: supabase login --token "${{ secrets.SUPABASE_ACCESS_TOKEN }}"

      - name: Link project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Set secrets for Edge Functions
        run: |
          # Os nomes de secret não podem começar com "SUPABASE_". 
          # A função scrape-news já lê alternativas PROJECT_URL e SERVICE_ROLE_KEY.
          # Compatibilidade: aceitar RECON_TRANSLATION_PROVIDER (preferido) ou RECON_TRANSLATOR_PROVIDER (caso tenha sido criado por engano).
          PROVIDER="${{ secrets.RECON_TRANSLATION_PROVIDER }}"
          if [ -z "$PROVIDER" ]; then
            PROVIDER="${{ secrets.RECON_TRANSLATOR_PROVIDER }}"
          fi

          supabase secrets set \
            PROJECT_URL="${{ secrets.SUPABASE_URL }}" \
            SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            # Provedor de tradução (ex.: deepl) e chave de API
            RECON_TRANSLATION_PROVIDER="$PROVIDER" \
            RECON_DEEPL_API_KEY="${{ secrets.RECON_DEEPL_API_KEY }}" \
            RECON_ADMIN_EMAILS="${{ secrets.RECON_ADMIN_EMAILS }}" \
            # Política editorial opcional
            RECON_ALLOWED_SOURCES="${{ secrets.RECON_ALLOWED_SOURCES }}" \
            RECON_BLOCKED_HOSTS="${{ secrets.RECON_BLOCKED_HOSTS }}" \
            # Restringir a conteúdo brasileiro quando desejado (default BR se não definido)
            RECON_COUNTRY_ONLY="${{ secrets.RECON_COUNTRY_ONLY || 'BR' }}" \
            RECON_FREE_API_URL="${{ secrets.RECON_FREE_API_URL }}" \
            RECON_FREE_API_KEY="${{ secrets.RECON_FREE_API_KEY }}" \
            RECON_FREE_API_PROVIDER="${{ secrets.RECON_FREE_API_PROVIDER }}" \
            RECON_TLD_WHITELIST="${{ secrets.RECON_TLD_WHITELIST }}" \
            RECON_ALLOWED_HOSTS="${{ secrets.RECON_ALLOWED_HOSTS }}"

      - name: Deploy scrape-news
        run: supabase functions deploy scrape-news
      - name: Deploy retranslate-articles
        run: supabase functions deploy retranslate-articles
      - name: Deploy cleanup-non-br
        run: supabase functions deploy cleanup-non-br
      - name: Invoke cleanup-non-br (post-deploy run)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -e
          echo "Calling cleanup-non-br after deploy"
          attempt=1
          max=3
          while [ $attempt -le $max ]; do
            http_code=$(curl -sS -w "%{http_code}" -o output.json -X POST \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" \
              -d '{}' \
              "${SUPABASE_URL}/functions/v1/cleanup-non-br" || true)
            echo "HTTP: ${http_code}"
            if [ "$http_code" = "200" ]; then
              echo "Cleanup executed"
              break
            fi
            echo "Retrying in 20s..."
            sleep 20
            attempt=$((attempt+1))
          done
          echo "Response body:" && cat output.json || true
