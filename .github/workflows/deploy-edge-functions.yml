name: Deploy Edge Functions (scrape-news)

on:
  push:
    branches: [ main ]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Login to Supabase
        run: supabase login --token "${{ secrets.SUPABASE_ACCESS_TOKEN }}"

      - name: Link project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Set secrets for Edge Functions
        run: |
          # Os nomes de secret não podem começar com "SUPABASE_". 
          # A função scrape-news já lê alternativas PROJECT_URL e SERVICE_ROLE_KEY.
          supabase secrets set \
            PROJECT_URL="${{ secrets.SUPABASE_URL }}" \
            SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            # Provedor de tradução (ex.: deepl) e chave de API
            RECON_TRANSLATION_PROVIDER="${{ secrets.RECON_TRANSLATION_PROVIDER }}" \
            RECON_DEEPL_API_KEY="${{ secrets.RECON_DEEPL_API_KEY }}" \
            # Política editorial opcional
            RECON_ALLOWED_SOURCES="${{ secrets.RECON_ALLOWED_SOURCES }}" \
            RECON_BLOCKED_HOSTS="${{ secrets.RECON_BLOCKED_HOSTS }}"

      - name: Deploy scrape-news
        run: supabase functions deploy scrape-news