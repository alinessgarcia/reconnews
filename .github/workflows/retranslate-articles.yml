name: Retranslate Articles (fill PT-BR fields)

on:
  schedule:
    # Execução diária às 07:30 UTC (04:30 BRT)
    - cron: '30 7 * * *'
  workflow_dispatch:

jobs:
  retranslate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: retranslate-articles
      cancel-in-progress: false
    steps:
      - name: Call retranslate-articles with retries
        env:
          FUNC_URL: "${{ secrets.SUPABASE_URL }}/functions/v1/retranslate-articles?limit=100"
          TOKEN: "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
        run: |
          echo "Calling $FUNC_URL"
          attempt=1
          max=3
          status=0
          while [ $attempt -le $max ]; do
            echo "Attempt ${attempt}/${max}"
            http_code=$(curl -sS -w "%{http_code}" -o output.json -X POST \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{}' \
              "$FUNC_URL" || true)
            status=$?
            echo "HTTP: ${http_code}"
            if [ "$http_code" = "200" ]; then
              echo "Success"
              break
            fi
            echo "Retrying in 60s..."
            sleep 60
            attempt=$((attempt+1))
          done
          echo "Response body:"
          cat output.json || true
          exit 0
      - name: Summarize
        if: always()
        run: |
          echo "Retranslate executed at $(date)"