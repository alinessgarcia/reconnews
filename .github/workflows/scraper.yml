name: News Scraper

on:
  schedule:
    # 2 execucoes por dia (horarios BRT convertidos para UTC)
    - cron: '0 10 * * *'  # 07:00 BRT -> 10:00 UTC
    - cron: '0 20 * * *'  # 17:00 BRT -> 20:00 UTC

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    timeout-minutes: 10
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
      cancel-in-progress: false
    steps:
      - name: Execute News Scraper with retries
        env:
          FUNC_URL: "${{ secrets.SUPABASE_URL }}/functions/v1/scrape-news"
          TOKEN: "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
        run: |
          echo "Calling $FUNC_URL"
          batches=(q1 q2 q3 q4 q5 q6 rss)
          for b in "${batches[@]}"; do
            echo "Batch: $b"
            attempt=1
            max=2
            while [ $attempt -le $max ]; do
              echo "Attempt ${attempt}/${max}"
              http_code=$(curl -sS -w "%{http_code}" -o output.json -X POST \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"batch\":\"$b\"}" \
                "$FUNC_URL" || true)
              echo "HTTP: ${http_code}"
              cat output.json || true
              if [ "$http_code" = "200" ]; then
                break
              fi
              echo "Retrying batch $b in 30s..."
              sleep 30
              attempt=$((attempt+1))
            done
          done
          exit 0
      - name: Summarize
        if: always()
        run: |
          echo "Scraper executed at $(date)"
