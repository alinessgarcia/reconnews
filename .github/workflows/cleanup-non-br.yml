name: Cleanup Non-BR Articles

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Login and link
        run: |
          supabase login --token "${{ secrets.SUPABASE_ACCESS_TOKEN }}"
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Deploy cleanup-non-br function
        run: supabase functions deploy cleanup-non-br

      - name: Call cleanup-non-br function
        env:
          FUNC_URL: "${{ secrets.SUPABASE_URL }}/functions/v1/cleanup-non-br"
          TOKEN: "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
        run: |
          set -e
          http_code=$(curl -sS -w "%{http_code}" -o output.json -X POST \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "$FUNC_URL")
          echo "HTTP: ${http_code}"
          cat output.json || true
          test "$http_code" = "200"
